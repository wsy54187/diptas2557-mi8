name: build diptas2557

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - 'codex/**'
    paths:
      - '.github/workflows/build-driver.yml'
      - 'acpi/**'
      - 'package/**'
      - 'scripts/**'
      - 'src/**'
      - 'diptas2557.sln'
      - 'diptas2557.vcxproj'
      - 'diptas2557.vcxproj.filters'

jobs:
  build-arm64:
    runs-on: windows-2022
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install WDK toolchain
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path -LiteralPath $vswhere)) {
            throw "vswhere.exe not found; the GitHub runner does not have Visual Studio Build Tools installed."
          }

          $vsInstall = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.ARM64 -property installationPath
          if (-not $vsInstall) {
            throw "Visual Studio ARM64 C++ tools were not found on the runner."
          }
          "Visual Studio: $vsInstall"

          $sdkRoot = "${env:ProgramFiles(x86)}\Windows Kits\10"
          $hasWdkTargets = Test-Path -LiteralPath (Join-Path $sdkRoot 'build\WindowsDriver.common.targets')
          $hasInf2Cat = Get-ChildItem -LiteralPath (Join-Path $sdkRoot 'bin') -Recurse -Filter inf2cat.exe -ErrorAction SilentlyContinue | Select-Object -First 1

          if (-not ($hasWdkTargets -and $hasInf2Cat)) {
            $installer = Join-Path $env:TEMP 'wdksetup-26100.exe'
            Invoke-WebRequest -Uri 'https://go.microsoft.com/fwlink/?linkid=2335869' -OutFile $installer
            $proc = Start-Process -FilePath $installer -ArgumentList @('/quiet','/norestart','/features','OptionId.WindowsDriverKitComplete') -Wait -PassThru
            if ($proc.ExitCode -ne 0 -and $proc.ExitCode -ne 3010) {
              throw "WDK installer failed with exit code $($proc.ExitCode)"
            }
          }

          Get-ChildItem -LiteralPath "${env:ProgramFiles(x86)}\Windows Kits\10\Include" -Directory -ErrorAction SilentlyContinue |
            Select-Object -ExpandProperty FullName
          Get-ChildItem -LiteralPath "${env:ProgramFiles(x86)}\Windows Kits\10\build" -ErrorAction SilentlyContinue |
            Select-Object -ExpandProperty FullName

      - name: Build and package ARM64 driver
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          powershell -ExecutionPolicy Bypass -File .\scripts\ci-build-driver-package.ps1

      - name: Upload driver package
        uses: actions/upload-artifact@v4
        with:
          name: diptas2557-arm64-testsigned
          path: |
            build/package/ARM64/**
            build/Release/ARM64/diptas2557.pdb
            build/ci/**
          if-no-files-found: error
